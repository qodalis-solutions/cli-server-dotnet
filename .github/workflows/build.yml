name: Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Qodalis.Cli.sln

      - name: Build
        run: dotnet build src/Qodalis.Cli.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Qodalis.Cli.Tests/Qodalis.Cli.Tests.csproj --configuration Release --no-build --verbosity normal
