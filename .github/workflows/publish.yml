name: Publish NuGet Package

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Qodalis.Cli.sln

      - name: Build all projects
        run: dotnet build src/Qodalis.Cli.sln --configuration Release --no-restore

      - name: Find and Publish NuGet Packages
        run: |
          # Search all folders under src/ for nupkg directories
          for dir in $(find ./src -type d -name "nupkg"); do
            echo "Found nupkg folder: $dir"

            # Publish all .nupkg files in the found folder
            for package in "$dir"/*.nupkg; do
              if [ -f "$package" ]; then
                echo "Publishing package: $package"
                dotnet nuget push "$package" \
                  --source "https://api.nuget.org/v3/index.json" \
                  --api-key ${{ secrets.NUGET_API_KEY }} \
                  --skip-duplicate
              fi
            done
          done

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
